name: workflow_Ansible

on:
  push:
    branches:
      - Terraform

  pull_request:
    paths:
      - "Terraform_aws/Terraform_code/**"
      - "Study-Ansible/Ansible/**"
      - ".github/**"

concurrency:
   group: ${{ github.workflow }}-${{ github.ref_name }}
   cancel-in-progress: true
     
jobs:
  terraform_apply:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
  
    defaults:
      run:
        working-directory: Terraform_aws/Terraform_code

    env:
      TF_VAR_key_name: ${{ secrets.TF_VAR_KEY_NAME }}
      TF_VAR_sns_email_address: ${{ secrets.TF_VAR_SNS_EMAIL_ADDRESS }}
      TF_VAR_rds_password: ${{ secrets.TF_VAR_RDS_PASSWORD }}
      AWS_DEFAULT_REGION: ap-northeast-1

    outputs:
      ec2_instance_id: ${{ steps.get_outputs.outputs.ec2_instance_id }}
      rds_endpoint: ${{ steps.get_outputs.outputs.rds_endpoint }}
      alb_url: ${{ steps.get_outputs.outputs.alb_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with: 
         terraform_version: '1.7.0'

      - name: Terraform Init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform Test
        run: terraform test

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve tfplan

      - name: Get outputs  
        id: get_outputs
        run: |
          id=$(terraform output -raw ec2_instance_id)
          endpoint=$(terraform output -raw rds_endpoint)
          url=$(terraform output -raw alb_url)
          echo "ec2_instance_id=$id" >> "$GITHUB_OUTPUT"
          echo "rds_endpoint=$endpoint" >> "$GITHUB_OUTPUT"
          echo "alb_url=$url" >> "$GITHUB_OUTPUT"         
  
  ansible:
    runs-on: ubuntu-latest
    needs: terraform_apply 
  
    defaults:
      run:
        working-directory: Study-Ansible/Ansible
    env:
      EC2_ID: ${{ needs.terraform_apply.outputs.ec2_instance_id }}
      RDS_ENDPOINT: ${{ needs.terraform_apply.outputs.rds_endpoint }}
      ALB_URL: ${{ needs.terraform_apply.outputs.alb_url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Install SSM Session Manager plugin
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb
          session-manager-plugin --version

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible 

      - name: Inject  pipx
        run: |
          pipx inject ansible-core boto3 botocore

      - name: Create inventory
        run: |
            cat <<EOF > inventory
            [web]
            $EC2_ID
         
            [web:vars]
            ansible_connection=aws_ssm
            ansible_aws_ssm_region=ap-northeast-1
            ansible_aws_ssm_bucket_name=terraform-study-momo
            db_host=$RDS_ENDPOINT
            db_name=terraform_rds
            db_user=admin
            db_password=${{ secrets.TF_VAR_RDS_PASSWORD}}

            EOF
      
      - name: Show inventory
        run: cat inventory

      - name: Ansible ping
        run: |
          ansible -vvv -i inventory web -m ping

      - name: Ansible playbook
        run: |
          ansible-playbook -i inventory playbook.yaml 
  
